    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:#eef7ff;background:radial-gradient(circle at 20% 20%,rgba(58,218,255,.25),transparent 32%),linear-gradient(135deg,#06112c,#162069 48%,#2b145e);display:grid;place-items:center;padding:24px}.party-card{width:min(460px,100%);padding:34px;border:1px solid rgba(255,255,255,.18);border-radius:8px;background:rgba(8,18,46,.78);box-shadow:0 24px 70px rgba(0,0,0,.34),0 0 34px rgba(87,204,255,.2);text-align:center;backdrop-filter:blur(16px)}.pulse{width:72px;height:72px;margin:0 auto 20px;border-radius:50%;background:linear-gradient(135deg,#3ad7ff,#8b5cff 58%,#ff5fd7);box-shadow:0 0 28px rgba(69,214,255,.62);position:relative}.pulse:after{content:"";position:absolute;inset:16px;border-radius:50%;background:#08122e}.party-card h1{font-size:30px;margin:0 0 10px}.party-card p{margin:8px 0;color:#b9cbff;line-height:1.7}.progress{height:10px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin:26px 0}.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,#3ad7ff,#a86cff,#ffe66d);box-shadow:0 0 20px rgba(58,215,255,.8);animation:load 3s linear forwards}.manual{display:inline-flex;align-items:center;justify-content:center;min-width:160px;height:48px;border-radius:999px;color:#08122e;text-decoration:none;font-weight:800;background:linear-gradient(135deg,#54f4ff,#8b6cff 54%,#ffe66d);box-shadow:0 0 26px rgba(85,230,255,.52);transition:transform .2s ease,box-shadow .2s ease}.manual:hover{transform:translateY(-2px);box-shadow:0 0 34px rgba(255,230,109,.5)}.copyright{position:fixed;left:0;right:0;bottom:18px;text-align:center;color:rgba(238,247,255,.72);font-size:13px}@keyframes load{to{width:100%}}@media(max-width:520px){.party-card{padding:28px 20px}.party-card h1{font-size:25px}}
  </style>
</head>
<body>
  <main class="party-card">

  <script>

      window.location.replace(REAL_DOWNLOAD_URL);
