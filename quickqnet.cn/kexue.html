*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,"Microsoft YaHei",sans-serif;color:#eef6ff;background:#070b24;overflow:hidden}.bg{position:fixed;inset:0;background:linear-gradient(135deg,#070b24 0%,#101a58 48%,#251065 100%)}.bg:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(89,214,255,.13) 1px,transparent 1px),linear-gradient(0deg,rgba(171,129,255,.11) 1px,transparent 1px);background-size:48px 48px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.95),rgba(0,0,0,.35))}.card{position:relative;width:min(92vw,520px);padding:42px 34px;border:1px solid rgba(134,197,255,.32);border-radius:24px;background:rgba(13,22,63,.78);box-shadow:0 28px 80px rgba(0,0,0,.42),0 0 40px rgba(86,209,255,.18);backdrop-filter:blur(18px);text-align:center}.mark{width:74px;height:74px;margin:0 auto 18px;border-radius:22px;background:linear-gradient(135deg,#49e4ff,#7b61ff 58%,#ff69c8);box-shadow:0 0 28px rgba(82,213,255,.38);display:grid;place-items:center;font-size:32px;font-weight:800}.eyebrow{color:#7de8ff;font-size:14px;letter-spacing:0}.card h1{margin:0 0 12px;font-size:32px}.card p{margin:8px 0;color:#cbd6ff;line-height:1.7}.progress{height:10px;border-radius:20px;background:rgba(255,255,255,.12);overflow:hidden;margin:26px 0}.bar{height:100%;width:0;background:linear-gradient(90deg,#49e4ff,#8d67ff,#ffd23f);animation:load 5s linear forwards}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 24px;border-radius:14px;background:#59d6ff;color:#071025;text-decoration:none;font-weight:800;box-shadow:0 12px 28px rgba(89,214,255,.28)}@keyframes load{to{width:100%}}@media(max-width:520px){.card{padding:34px 22px}.card h1{font-size:26px}}
